<script>
(() => {
const clientField = document.getElementById("clientField");
const secretField = document.getElementById("secretField");
const clientWrap = document.getElementById("clientWrap");
const secretWrap = document.getElementById("secretWrap");
const keys = document.querySelectorAll(".key:not(.backspace)");
const backspaceBtn = document.getElementById("backspaceBtn");
const clearButtons = document.querySelectorAll(".clear-btn");
const submitBtn = document.getElementById("submitBtn");
const fieldHint = document.getElementById("fieldHint");
let activeField = null;
function sanitize(v){
return String(v).replace(/\D/g,"");
}
function getVal(el){
return sanitize(el.dataset.value || "");
}
function setVal(el,val){
el.dataset.value = sanitize(val);
updateDisplay(el);
updateAria(el);
toggleSubmit();
}
function updateDisplay(el){
const val=getVal(el);
const value=el.querySelector(".value");
const placeholder=el.querySelector(".placeholder");
if(!val){
value.textContent="";
placeholder.style.display="";
}else{
placeholder.style.display="none";
value.textContent=
el.dataset.secret==="true"
? "•".repeat(val.length)
: val;
}
}
function updateAria(el){
const val=getVal(el);
const max=parseInt(el.dataset.max,10);
el.setAttribute(
"aria-invalid",
String(val.length!==0 && val.length!==max)
);
el.setAttribute(
"aria-valuetext",
el.dataset.secret==="true"
? `${val.length} chiffres saisis`
: (val || "vide")
);
}
function focusField(el){
if(!el) return;
activeField=el;
[clientWrap,secretWrap]
.forEach(w=>w.classList.remove("focused"));
(el===clientField
? clientWrap
: secretWrap
).classList.add("focused");
el.focus({
preventScroll:true
});
updateHint();
}
function updateHint(){
if(!activeField){
fieldHint.textContent=
"Cliquez sur un champ pour commencer";
return;
}
const val=getVal(activeField);
fieldHint.textContent=
activeField===clientField
? `Numéro client : ${val.length}/10`
: `Code secret : ${val.length}/6`;
}
function append(el,ch){
if(!el) return;
let val=getVal(el);
const max=parseInt(el.dataset.max,10);
if(val.length>=max) return;
if(!/^\d$/.test(ch)) return;
setVal(el,val+ch);
updateHint();
}
function remove(el){
if(!el){
focusField(secretField);
return;
}
setVal(
el,
getVal(el).slice(0,-1)
);
updateHint();
}
function toggleSubmit(){
const c=getVal(clientField);
const s=getVal(secretField);
submitBtn.disabled=
!(
/^\d{10}$/.test(c)
&&
/^\d{6}$/.test(s)
);
}
function showMessage(msg){
fieldHint.textContent=msg;
}
function attemptSubmit(){
if(submitBtn.disabled){
if(getVal(clientField).length!==10){
focusField(clientField);
showMessage(
"Numéro client incomplet"
);
return;
}
focusField(secretField);
showMessage(
"Code secret incomplet"
);
return;
}
/* MODE DÉMO UNIQUEMENT */
submitBtn.disabled=true;
showMessage(
"Validation effectuée"
);
setTimeout(()=>{
submitBtn.disabled=false;
},1000);
}
[
clientField,
secretField
].forEach(el=>{
el.addEventListener(
"pointerdown",
e=>{
e.preventDefault();
focusField(el);
}
);
el.addEventListener(
"keydown",
e=>{
if(/^\d$/.test(e.key)){
e.preventDefault();
append(el,e.key);
return;
}
if(e.key==="Backspace"){
e.preventDefault();
remove(el);
return;
}
if(e.key==="Enter"){
e.preventDefault();
attemptSubmit();
}
}
);
});
keys.forEach(btn=>{
btn.addEventListener(
"pointerdown",
e=>{
e.preventDefault();
if(!activeField){
focusField(secretField);
}
append(
activeField,
btn.dataset.key
);
}
);
});
backspaceBtn.addEventListener(
"pointerdown",
e=>{
e.preventDefault();
remove(activeField);
}
);
clearButtons.forEach(btn=>{
btn.addEventListener(
"pointerdown",
e=>{
e.preventDefault();
const target=
document.getElementById(
btn.dataset.target
);
if(target){
setVal(target,"");
focusField(target);
}
}
);
});
submitBtn.addEventListener(
"click",
e=>{
e.preventDefault();
attemptSubmit();
}
);
const live=document.createElement("div");
live.setAttribute(
"aria-live",
"polite"
);
live.style.cssText=
"position:absolute;left:-9999px";
document.body.appendChild(live);
function announce(){
live.textContent=
`Client ${getVal(clientField).length}
 Secret ${getVal(secretField).length}`;
}
new MutationObserver(announce)
.observe(
clientField,
{
attributes:true,
attributeFilter:["data-value"]
}
);
new MutationObserver(announce)
.observe(
secretField,
{
attributes:true,
attributeFilter:["data-value"]
}
);
toggleSubmit();
requestAnimationFrame(()=>{
focusField(clientField);
});
})();
</script>
