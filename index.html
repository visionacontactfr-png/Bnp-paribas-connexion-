<!doctype html>

<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Accéder à mes comptes — Démonstration</title>
<style>
:root{
--green:#35a05b;
--green-dark:#258f4c;
--white:#fff;
--border:#e2e2e2;
}
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}
body{
background:var(--green);
min-height:100vh;
display:flex;
justify-content:center;
padding:24px;
}
.panel{
width:100%;
max-width:420px;
}
.header{
text-align:center;
color:white;
margin-bottom:20px;
}
.header h1{
font-size:24px;
font-weight:300;
}
.header p{
margin-top:8px;
font-size:13px;
}
.form{
background:rgba(255,255,255,.08);
padding:18px;
border-radius:16px;
}
.label{
color:white;
margin-bottom:8px;
display:block;
}
.box{
background:white;
height:52px;
border-radius:10px;
display:flex;
align-items:center;
padding:12px;
border:1px solid var(--border);
margin-bottom:14px;
}
.field{
flex:1;
outline:none;
user-select:none;
}
.placeholder{
color:#777;
}
.value{
letter-spacing:2px;
}
.numpad{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:16px;
}
.key{
height:58px;
border:none;
border-radius:10px;
background:white;
font-size:22px;
cursor:pointer;
}
.key:active{
transform:scale(.98);
}
.submit{
margin-top:14px;
width:100%;
height:50px;
border:none;
border-radius:10px;
background:var(--green-dark);
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
}
.submit:disabled{
opacity:.5;
}
.hint{
margin-top:10px;
text-align:center;
color:white;
font-size:12px;
}
</style>
</head>
<body>
<div class="panel">
<div class="header">
<h1>ACCÉDER À MES COMPTES</h1>
<p>Version démonstration</p>
</div>
<div class="form">
<label class="label">
Mon numéro client
</label>
<div class="box">
<div id="client" class="field">
<span class="placeholder">XXXXXXXXXX</span>
<span class="value"></span>
</div>
</div>
<label class="label">
Mon code secret
</label>
<div class="box">
<div id="secret" class="field">
<span class="placeholder">******</span>
<span class="value"></span>
</div>
</div>
<div class="numpad">
<button class="key">1</button>
<button class="key">2</button>
<button class="key">3</button>

4
5
6

7
8
9

⌫
0
⇄

</div>
<button class="submit" id="submit" disabled>
Accéder à mes comptes
</button>
<div class="hint" id="hint">
Champ actif : numéro client
</div>
</div>
</div>
<script>
const client=document.getElementById("client");
const secret=document.getElementById("secret");
const submit=document.getElementById("submit");
const hint=document.getElementById("hint");
let active="client";
let values={
client:"",
secret:""
};
function refresh(){
client.querySelector(".placeholder")
.style.display=
values.client?"none":"";
client.querySelector(".value")
.textContent=
values.client;
secret.querySelector(".placeholder")
.style.display=
values.secret?"none":"";
secret.querySelector(".value")
.textContent=
"•".repeat(values.secret.length);
submit.disabled=
!(
values.client.length===10
&&
values.secret.length===6
);
hint.textContent=
active==="client"
?
"Champ actif : numéro client"
:
"Champ actif : code secret";
}
document.querySelectorAll(".key")
.forEach(btn=>{
btn.addEventListener("click",()=>{
const v=btn.textContent;
if(/^\d$/.test(v)){
const max=
active==="client"
?10
:6;
if(values[active].length<max){
values[active]+=v;
}
}
if(btn.id==="back"){
values[active]=
values[active].slice(0,-1);
}
if(btn.id==="switch"){
active=
active==="client"
?
"secret"
:
"client";
}
refresh();
});
});
submit.addEventListener("click",()=>{
hint.textContent=
"Validation effectuée (démo uniquement)";
});
refresh();
</script>
</body>
</html>
